<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Portal de equipo · Yo Desarrollo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
  :root{
    --crema:#0a0a0c; --crema-2:#121215; --card:#16161a;
    --oro:#c9a96e; --oro-d:#e0c590; --tinta:#f4f1ea; --tinta-2:#b6b3aa; --linea:rgba(255,255,255,.09);
  }
  *{box-sizing:border-box}
  body{margin:0;background:linear-gradient(rgba(255,255,255,.012) 1px, transparent 1px) 0 0 / 60px 60px, linear-gradient(90deg, rgba(255,255,255,.012) 1px, transparent 1px) 0 0 / 60px 60px, var(--crema);color:var(--tinta);font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:44px 28px 56px}
  .mark{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--oro);font-weight:600;margin-bottom:10px}
  h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:40px;line-height:1.08;margin:0 0 10px}
  .sub{font-size:15px;color:var(--tinta-2);margin:0 0 30px;max-width:54ch;line-height:1.55}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:18px}
  .card{background:var(--card);border:1px solid var(--linea);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:transform .15s,box-shadow .15s}
  .card.link:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.45);border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.06)}
  .card.disabled{cursor:default}
  .thumb{position:relative;height:152px;background:var(--crema-2);overflow:hidden;border-bottom:1px solid var(--linea)}
  .thumb img{width:100%;height:100%;object-fit:cover;object-position:top left}
  .thumb.soon img{filter:grayscale(.6) opacity(.55)}
  .body{padding:15px 17px 17px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}
  .ic{font-size:21px;color:var(--oro);line-height:1}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--linea);color:var(--tinta-2);background:rgba(255,255,255,.035);white-space:nowrap}
  .badge.key{color:var(--oro-d);border-color:rgba(201,169,110,.35);background:rgba(201,169,110,.14)}
  .badge.soon{color:#D9A45B;border-color:rgba(217,164,91,.35);background:rgba(217,164,91,.14)}
  .badge.maintenance{color:#ffca72;border-color:rgba(255,202,114,.42);background:rgba(255,159,67,.13)}
  .ttl{font-family:'Instrument Serif',serif;font-weight:400;font-size:20px;margin:0 0 5px}
  .desc{font-size:13px;color:var(--tinta-2);line-height:1.5;margin:0 0 9px}
  .who{font-size:12px;color:#8a8780;margin:0}
  .who b{color:var(--tinta-2);font-weight:600}
  .foot{margin-top:34px;border-top:1px solid var(--linea);padding-top:16px;font-size:12px;color:#8a8780}
  .source{display:flex;align-items:center;gap:8px;margin:-17px 0 22px;color:#8a8780;font-size:11px}
  .source i{color:var(--oro)}
  .empty{grid-column:1/-1;padding:34px;border:1px dashed var(--linea);border-radius:16px;text-align:center;color:var(--tinta-2)}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">Yo Desarrollo · interno</div>
    <h1>Portal de equipo</h1>
    <p class="sub" id="saludo">Tus tableros en un solo lugar — cada acceso se controla según su responsable y nivel de sensibilidad.</p>

    <div class="source" id="source"><i class="ti ti-loader-2"></i><span>Sincronizando con Control Maestro…</span></div>
    <div class="grid" id="portal-grid"><div class="empty">Cargando tableros…</div></div>

    <div class="foot">Acceso interno · Co-desarrolladores se entra por separado desde el menú de yodesarrollo.mx</div>
  </div>
<script>
  (function(){
    var h = new Date().getHours();
    var s = h < 12 ? 'Buenos días' : (h < 19 ? 'Buenas tardes' : 'Buenas noches');
    var el = document.getElementById('saludo');
    el.textContent = s + '. ' + el.textContent;

    var ENDPOINT = 'https://script.google.com/macros/s/AKfycby5LKYKRwl0EsNgppOIeD_ArST8vSXRgNO4ns8XZbFW4yjfglzu4io_vhabB8h-J792Tw/exec?action=read&resource=Portal';
    var grid = document.getElementById('portal-grid');
    var source = document.getElementById('source');

    function escapeHtml(value){
      return String(value == null ? '' : value).replace(/[&<>'"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c];});
    }
    function badge(row){
      if (!row.url) return {cls:'soon',icon:'clock',text:'Próximamente'};
      if (row.estado === 'Mantenimiento') return {cls:'maintenance',icon:'shield-lock',text:'Mantenimiento seguro'};
      if (row.sensibilidad === 'Confidencial' || row.sensibilidad === 'Restringido') return {cls:'key',icon:'lock',text:row.estado};
      return {cls:'',icon:'shield-check',text:row.estado || 'Disponible'};
    }
    function card(row){
      var b=badge(row), enabled=Boolean(row.url), tag=enabled?'a':'div';
      var attrs=enabled?' href="'+escapeHtml(row.url)+'" target="_blank" rel="noopener noreferrer"':' aria-disabled="true"';
      return '<'+tag+' class="card '+(enabled?'link':'disabled')+'"'+attrs+' data-system-id="'+escapeHtml(row.system_id)+'">'+
        '<div class="thumb '+(enabled?'':'soon')+'"><img src="'+escapeHtml(row.miniatura)+'" alt="Vista previa de '+escapeHtml(row.titulo_portal)+'"></div>'+
        '<div class="body"><div class="row"><span class="ic"><i class="ti ti-'+escapeHtml(row.icono)+'"></i></span><span class="badge '+b.cls+'"><i class="ti ti-'+b.icon+'"></i>'+escapeHtml(b.text)+'</span></div>'+
        '<div class="ttl">'+escapeHtml(row.titulo_portal)+'</div><p class="desc">'+escapeHtml(row.descripcion_portal)+'</p><p class="who"><b>Para:</b> '+escapeHtml(row.audiencia)+'</p></div></'+tag+'>';
    }
    function render(rows,label){
      var clean=rows.filter(function(r){return r.visible==='SI'&&r.system_id;}).sort(function(a,b){return Number(a.orden)-Number(b.orden);});
      grid.innerHTML=clean.length?clean.map(card).join(''):'<div class="empty">No hay tableros visibles configurados.</div>';
      source.innerHTML='<i class="ti ti-database-check"></i><span>'+escapeHtml(label)+' · '+clean.length+' módulos</span>';
    }
    var controller = new AbortController();
    var liveTimeout = setTimeout(function(){ controller.abort(); }, 2500);
    fetch(ENDPOINT,{credentials:'omit',signal:controller.signal}).then(function(r){if(!r.ok)throw new Error('backend');return r.json();}).then(function(data){
      clearTimeout(liveTimeout);
      if(!data.ok||!Array.isArray(data.rows))throw new Error('payload'); render(data.rows,'Datos en vivo desde Sheets');
    }).catch(function(){
      clearTimeout(liveTimeout);
      fetch('portal-data.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){render(data.rows||[],'Copia operativa verificada');}).catch(function(){
        grid.innerHTML='<div class="empty">No fue posible cargar el catálogo. Abre el Control Maestro o intenta nuevamente.</div>';
        source.innerHTML='<i class="ti ti-alert-triangle"></i><span>Catálogo temporalmente no disponible</span>';
      });
    });
  })();
</script>
<script src="https://alexpueblag.github.io/potenciales-yod/portero.js" data-singate></script>
</body>
</html>
