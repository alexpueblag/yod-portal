<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow,noarchive"><meta name="referrer" content="no-referrer"><title>Portal de equipo · Yo Desarrollo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.24.0/dist/tabler-icons.min.css">
<style>
:root{--crema:#17140F;--crema-2:#221E17;--card:#221E17;--oro:#B98B3C;--oro-d:#D8AE5E;--tinta:#F1EDE3;--tinta-2:#B5AC99;--linea:rgba(255,255,255,.08)}*{box-sizing:border-box}body{margin:0;background:radial-gradient(1000px 520px at 82% -6%,rgba(176,124,46,.10),transparent 60%),linear-gradient(rgba(255,255,255,.014) 1px,transparent 1px) 0 0/60px 60px,linear-gradient(90deg,rgba(255,255,255,.014) 1px,transparent 1px) 0 0/60px 60px,var(--crema);color:var(--tinta);font-family:'Instrument Sans',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}.wrap{max-width:1080px;margin:0 auto;padding:44px 28px 56px}.mark{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--oro);font-weight:600;margin-bottom:10px}h1{font-family:'Instrument Serif',serif;font-weight:400;font-size:40px;line-height:1.08;margin:0 0 10px}.sub{font-size:15px;color:var(--tinta-2);margin:0 0 30px;max-width:58ch;line-height:1.55}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(300px,100%),1fr));gap:18px}.card{background:var(--card);border:1px solid var(--linea);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;text-decoration:none;color:inherit;transition:transform .15s,box-shadow .15s}.card.link:hover,.card.link:focus-visible{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.45);border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.06);outline:2px solid var(--oro);outline-offset:3px}.card.disabled{cursor:default;opacity:.68}.thumb{position:relative;height:152px;background:var(--crema-2);overflow:hidden;border-bottom:1px solid var(--linea)}.thumb img{width:100%;height:100%;object-fit:cover;object-position:top left}.thumb.soon img{filter:grayscale(.75) opacity(.38)}.body{padding:15px 17px 17px}.row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:7px}.ic{font-size:21px;color:var(--oro);line-height:1}.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;border:1px solid var(--linea);color:var(--tinta-2);background:rgba(255,255,255,.035);white-space:nowrap}.badge.active{color:#93c096;border-color:rgba(76,122,90,.45);background:rgba(76,122,90,.16)}.badge.review{color:#8aabc7;border-color:rgba(62,100,132,.45);background:rgba(62,100,132,.16)}.badge.soon{color:#d8a24e;border-color:rgba(176,124,46,.4);background:rgba(176,124,46,.15)}.badge.maintenance{color:#d8a24e;border-color:rgba(176,124,46,.45);background:rgba(176,124,46,.14)}.ttl{font-family:'Instrument Serif',serif;font-weight:400;font-size:20px;margin:0 0 5px}.desc{font-size:13px;color:var(--tinta-2);line-height:1.5;margin:0 0 9px}.who{font-size:12px;color:#8a8780;margin:0}.who b{color:var(--tinta-2);font-weight:600}.foot{margin-top:34px;border-top:1px solid var(--linea);padding-top:16px;font-size:12px;color:#8a8780}.source{display:flex;align-items:center;gap:8px;margin:-17px 0 22px;color:#8a8780;font-size:11px}.source i{color:var(--oro)}.empty{grid-column:1/-1;padding:34px;border:1px dashed var(--linea);border-radius:16px;text-align:center;color:var(--tinta-2)}@media(max-width:520px){.wrap{padding:30px 16px 42px}h1{font-size:34px}.grid{gap:13px}.badge{font-size:10px;white-space:normal;text-align:right}}
</style></head><body><main class="wrap"><div class="mark">Yo Desarrollo · interno</div><h1>Portal de equipo</h1><p class="sub" id="saludo">Tus tableros en un solo lugar. Toca cualquiera para abrirlo.</p><div class="source" id="source"><i class="ti ti-loader-2" aria-hidden="true"></i><span>Sincronizando con Control Maestro…</span></div><div class="grid" id="portal-grid" aria-live="polite"><div class="empty">Cargando tableros…</div></div><div class="foot">La disponibilidad, URL y sensibilidad se gobiernan desde YOD OS · Control Maestro.</div></main>
<script src="portal-core.js?v=1.0.2"></script><script>
(function(){'use strict';var h=new Date().getHours(),s=h<12?'Buenos días':h<19?'Buenas tardes':'Buenas noches',el=document.getElementById('saludo'),grid=document.getElementById('portal-grid'),source=document.getElementById('source'),core=window.PortalCore;el.textContent=s+'. '+el.textContent;var endpoint='https://script.google.com/macros/s/AKfycby5LKYKRwl0EsNgppOIeD_ArST8vSXRgNO4ns8XZbFW4yjfglzu4io_vhabB8h-J792Tw/exec?action=read&resource=Portal';function render(rows){var clean=core.cleanRows(rows);grid.innerHTML=clean.length?clean.map(core.card).join(''):'<div class="empty">No hay módulos visibles configurados.</div>';source.innerHTML='<i class="ti ti-database-check" aria-hidden="true"></i><span>Datos en vivo desde Sheets · '+clean.length+' módulos</span>';}var controller=new AbortController(),timeout=setTimeout(function(){controller.abort();},8000);fetch(endpoint,{credentials:'omit',signal:controller.signal,cache:'no-store'}).then(function(r){if(!r.ok)throw Error('backend');return r.json();}).then(function(data){clearTimeout(timeout);if(!data.ok||!Array.isArray(data.rows))throw Error('payload');render(data.rows);}).catch(function(){clearTimeout(timeout);grid.innerHTML='<div class="empty">El catálogo no está disponible. Ningún acceso se habilitó; intenta nuevamente.</div>';source.innerHTML='<i class="ti ti-alert-triangle" aria-hidden="true"></i><span>Control Maestro temporalmente no disponible · modo seguro</span>';});})();
</script><script src="https://alexpueblag.github.io/potenciales-yod/portero.js?v=a5449a2"></script></body></html>
