<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Track de Codesarrollos · Yo Desarrollo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.css">
<style>
  :root{--bg:#0a0a0c;--card:#131317;--text:#f4f1ea;--muted:#8a8780;--suave:#b6b3aa;--linea:rgba(255,255,255,.09);--lineaf:rgba(255,255,255,.16);--gold:#c9a96e;--goldc:#e0c590;--green:#8FBF8B;--orange:#D9A45B;--red:#E0605A}
  *{box-sizing:border-box}
  body{font-family:'Manrope',-apple-system,sans-serif;color:var(--text);margin:0;background:var(--bg);-webkit-font-smoothing:antialiased}
  .serif{font-family:'Instrument Serif',Georgia,serif;font-weight:400}
  header{position:relative;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;background:rgba(10,10,12,.94);border-bottom:1px solid #c9a96e59}
  header .kick{font-size:9px;font-weight:800;letter-spacing:.22em;color:var(--gold);text-transform:uppercase}
  header a{color:var(--goldc);font-size:11px;font-weight:700;text-decoration:none}
  #wrap{position:relative;height:calc(100vh - 46px)}
  #map{position:absolute;inset:0;background:#0a0a0c}
  .leaflet-container{font:inherit}
  .leaflet-popup-content-wrapper{background:#16161b;color:var(--text);border:1px solid var(--lineaf);border-radius:14px;box-shadow:0 12px 32px #000a}
  .leaflet-popup-tip{background:#16161b}
  .pp-t{font-family:'Instrument Serif',Georgia,serif;font-size:17px;margin:0 0 2px}
  .pp-badge{display:inline-block;font-size:8.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border-radius:9px;padding:2px 8px;color:#0a0a0c;margin-bottom:6px}
  .pp-l{font-size:10.5px;color:var(--muted);margin:0 0 7px}
  .pp-d{font-size:11px;color:var(--suave);line-height:1.5;margin:0 0 3px}
  .pp-d b{color:var(--goldc)}
  .pp-a{display:inline-block;margin-top:8px;background:var(--gold);color:#0a0a0c!important;font-size:10px;font-weight:800;border-radius:9px;padding:6px 10px;text-decoration:none;text-transform:uppercase;letter-spacing:.06em}
  .pp-a.off{background:rgba(255,255,255,.1);color:var(--muted)!important;cursor:default}
  .pin-emoji{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50% 50% 50% 4px;border:2px solid #0a0a0c;box-shadow:0 4px 12px #000b;font-size:15px}
  .panel{position:absolute;z-index:1100;top:12px;left:12px;background:rgba(19,19,23,.92);backdrop-filter:blur(10px);border:1px solid var(--linea);border-radius:16px;padding:12px 14px;max-width:280px}
  .panel h1{font-size:20px;margin:0}
  .panel .sub{font-size:10.5px;color:var(--muted);margin:2px 0 0;line-height:1.45}
  .leyenda{display:flex;gap:10px;margin-top:9px;font-size:10px;font-weight:700;color:var(--suave)}
  .leyenda i{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
  .pie{position:absolute;z-index:1100;bottom:10px;left:12px;font-size:9.5px;color:var(--muted);background:rgba(10,10,12,.7);border-radius:8px;padding:4px 8px}
  @media(max-width:640px){
    .panel{left:8px;right:8px;max-width:none;padding:9px 11px}
    .panel h1{font-size:16px}
  }
</style>
</head>
<body>
<header>
  <span class="kick">Yo Desarrollo · Track de Codesarrollos</span>
  <a href="./">← Portal de equipo</a>
</header>
<div id="wrap">
  <div id="map"></div>
  <div class="panel">
    <h1 class="serif">Track de Codesarrollos</h1>
    <p class="sub">Cada pin es un co-desarrollo con su tablero de trámites: qué hicimos, qué falta y qué sigue. Toca el pin y abre su track.</p>
    <div class="leyenda"><span><i style="background:var(--green)"></i>track vivo</span><span><i style="background:var(--orange)"></i>track pendiente</span></div>
  </div>
  <div class="pie">los tableros de cada co-desarrollo piden su propia clave</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://unpkg.com/leaflet-gesture-handling@1.2.2/dist/leaflet-gesture-handling.min.js"></script>
<script>
(()=>{
  // Co-desarrollos con track de trámites. Sin datos sensibles aquí: nombres, lugares y estado.
  // (Siguiente iteración: volverlo sheet-driven como los pines de Potenciales.)
  const PINES=[
    {nombre:'Real de Miramar',lugar:'Miramar, Guaymas, Sonora',lat:27.906,lng:-110.955,emoji:'🏗️',color:'#8FBF8B',estado:'TRACK VIVO',
     d1:'Co-desarrollo en ejecución · tramitología y avance al día',d2:'Qué hicimos · qué falta · qué sigue, con la escalera precio↔permiso',
     link:'https://alexpueblag.github.io/real-miramar-board/',cta:'Abrir track →'},
    {nombre:'Casa Alysa',lugar:'Altozano, Hermosillo, Sonora',lat:29.0675,lng:-111.0713,emoji:'🏡',color:'#8FBF8B',estado:'TRACK VIVO',
     d1:'Co-desarrollo con obra y comercialización en curso',d2:'Qué hicimos · qué falta · qué sigue en 4 fases (obra, financiero, comercialización, cierre) — hitos por confirmar con dirección',
     link:'track-alysa.html',cta:'Abrir track →'}
  ];
  const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  const map=L.map('map',{zoomControl:true,attributionControl:true,gestureHandling:true,gestureHandlingOptions:{duration:1200,text:{touch:'Usa dos dedos para mover el mapa',scroll:'Usa ctrl + scroll para hacer zoom',scrollMac:'Usa ⌘ + scroll para hacer zoom'}}}).setView([28.5,-110.9],7);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OpenStreetMap &copy; CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);
  window._map=map;
  let bounds=L.latLngBounds(PINES.map(p=>[p.lat,p.lng])).pad(0.5);
  PINES.forEach(p=>{
    const icon=L.divIcon({className:'',html:`<div class="pin-emoji" style="background:${p.color}">${p.emoji}</div>`,iconSize:[32,32],iconAnchor:[16,30],popupAnchor:[0,-26]});
    const html=`<div style="min-width:220px"><span class="pp-badge" style="background:${p.color}">${esc(p.estado)}</span><p class="pp-t">${esc(p.nombre)}</p><p class="pp-l">📍 ${esc(p.lugar)}</p><p class="pp-d">${esc(p.d1)}</p><p class="pp-d"><b>${esc(p.d2)}</b></p>${p.link?`<a class="pp-a" href="${esc(p.link)}" target="_blank" rel="noopener">${esc(p.cta)}</a>`:`<span class="pp-a off">${esc(p.cta)}</span>`}</div>`;
    L.marker([p.lat,p.lng],{icon}).bindPopup(html).addTo(map);
  });
  // el contenedor puede medir 0×0 al arrancar (pestaña en background): reintentar
  (function ajusta(n){setTimeout(()=>{map.invalidateSize();if(map.getSize().x>0)map.fitBounds(bounds);else if(n>0)ajusta(n-1)},300)})(25);
  document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){map.invalidateSize();map.fitBounds(bounds)}});
  window.addEventListener('resize',()=>map.invalidateSize());
})();
</script>
</body>
</html>
